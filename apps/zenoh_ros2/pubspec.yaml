name: zenoh_ros2
description: >-
  Dependency-minimal ROS 2 client over Zenoh (zenoh_ffi) + pure-Dart CDR. Reaches
  a ROS 2 graph via zenoh-bridge-ros2dds (or rmw_zenoh) with no ROS install; all
  message (de)serialization is Dart via ros2_cdr. Add from pub.dev — the native
  Zenoh transport comes from the zenoh_ffi FFI plugin.
version: 0.1.0
homepage: https://github.com/harunkurtdev/rcldart
repository: https://github.com/harunkurtdev/rcldart
issue_tracker: https://github.com/harunkurtdev/rcldart/issues

topics:
  - ros2
  - zenoh
  - robotics
  - messaging

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Pulled from GitHub — no workspace checkout needed.
  ros2_cdr:
    git:
      url: https://github.com/rcldart/rcldart_ws.git
      path: dart/ros2_cdr
      ref: main
  zenoh_ffi:
    git:
      url: https://github.com/harunkurtdev/zenoh_ffi.git
      ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Local workspace dev; delete to build purely from GitHub.
dependency_overrides:
  ros2_cdr:
    path: ../../dart/ros2_cdr
  zenoh_ffi:
    path: ../../../zenoh_ffi
