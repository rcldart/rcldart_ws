name: flutglove_dds
description: >-
  A minimal Foxglove-style ROS 2 visualizer that pulls the live graph DIRECTLY
  over CycloneDDS — no bridge, no WebSocket, no ROS install. Built entirely on the
  dds_direct (CycloneDDS-FFI) + ros2_cdr layer, as a second, simpler frontend over
  the same DDS core.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Pulled from GitHub — the CycloneDDS layer builds itself, no workspace needed.
  dds_direct:
    git:
      url: https://github.com/rcldart/rcldart_ws.git
      path: apps/dds_direct
      ref: main

dependency_overrides:
  dds_direct:
    path: ../dds_direct
  ros2_cdr:
    path: ../../dart/ros2_cdr

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
